kind = "web"
previewPath = "/"
title = "ControlTear"
version = "1.0.0"
id = "artifacts/controltear"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22149

[services.development]
run = "pnpm --filter @workspace/controltear run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/controltear", "run", "build" ]
publicDir = "artifacts/controltear/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22149"
BASE_PATH = "/"
